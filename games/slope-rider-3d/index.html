<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Slope Rider 3D</title>
  <link rel="stylesheet" href="game.css">
  <style>
    body { margin:0; padding:0; background:#000; overflow:hidden; }
    #unity-container { position:fixed; inset:0; }
    #unity-canvas { width:100%; height:100%; display:block; }
    #unity-loading-bar { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); text-align:center; }
    #unity-progress-bar-empty { width:141px; height:18px; margin-top:10px; background:url(loading.png) no-repeat center; }
    #unity-progress-bar-full { width:0; height:18px; background:url(loading.png) no-repeat center; }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
  </div>
  <script>
    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/slope-rider-3d-v26032402.loader.js";
    var config = {
      dataUrl:      buildUrl + "/slope-rider-3d-v26032402.data.unityweb",
      frameworkUrl: buildUrl + "/slope-rider-3d-v26032402.framework.js.unityweb",
      codeUrl:      buildUrl + "/slope-rider-3d-v26032402.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "self-hosted",
      productName: "Slope Rider 3D",
      productVersion: "26032402"
    };
    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = function() {
      createUnityInstance(document.querySelector("#unity-canvas"), config, function(progress) {
        document.querySelector("#unity-progress-bar-full").style.width = (100 * progress) + "%";
      }).then(function(unityInstance) {
        document.querySelector("#unity-loading-bar").style.display = "none";
      });
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
