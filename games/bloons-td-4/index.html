<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Bloons Tower Defense 4</title>
<meta id="viewport" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes">
<script type="text/javascript" src="./lib/clipboard.min.js"></script>
<script type="text/javascript" src="./lib/howler.min.js"></script>
<script type="text/javascript" src="./game.js"></script>
<script>
	if (typeof window.devicePixelRatio != 'undefined' && window.devicePixelRatio > 2) {
		var meta = document.getElementById("viewport");
		meta.setAttribute('content', 'width=device-width, initial-scale=' + (2 / window.devicePixelRatio) + ', user-scalable=no');
	}

	function visibilityChange() {
		var hidden = 'hidden';
		if (hidden in document)
			document.addEventListener('visibilitychange', onchange);
		else if ((hidden = 'mozHidden') in document)
			document.addEventListener('mozvisibilitychange', onchange);
		else if ((hidden = 'webkitHidden') in document)
			document.addEventListener('webkitvisibilitychange', onchange);
		else if ((hidden = 'msHidden') in document)
			document.addEventListener('msvisibilitychange', onchange);
		else if ('onfocusin' in document)
			document.onfocusin = document.onfocusout = onchange;
		else
			window.onpageshow = window.onpagehide = window.onfocus = window.onblur = onchange;

		function onchange(evt) {
			let v = false, h = true,
				evtMap = { focus:v, focusin:v, pageshow:v, blur:h, focusout:h, pagehide:h };
			evt = evt || window.event;
			let windowHidden = (evt.type in evtMap) ? evtMap[evt.type] : this[hidden];
			var howl = Howler;
			if (howl) { windowHidden ? howl.mute(true) : howl.mute(false); }
		}
		if (document[hidden] !== undefined)
			onchange({ type: document[hidden] ? 'blur' : 'focus' });
	}
	visibilityChange();
</script>
<style>
	html,body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
	#openfl-content {}
	canvas { max-width:100%; display:block; margin:auto; }
	body { -webkit-touch-callout:none; -webkit-tap-highlight-color:rgba(0,0,0,0); }
	body * { -webkit-touch-callout:none; -webkit-tap-highlight-color:rgba(0,0,0,0); }
</style>
<script>
	window.addEventListener('keydown', function(e) {
		if ([32, 37, 38, 39, 40].indexOf(e.keyCode) > -1 && e.target == document.body) {
			e.preventDefault();
		}
	}, false);
</script>
</head>
<body>
<div id="root">
<div id="openfl-content"></div>
</div>
<script type="text/javascript">
	lime.embed("openfl-content", 640, 640, "FFFFFF");
</script>
</body>
</html>
