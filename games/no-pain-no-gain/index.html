<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>No Pain No Gain</title>
  <style>
    body { margin:0; padding:0; background:#000; overflow:hidden; }
    #unity-canvas { width:100%; height:100vh; display:block; }
    #loading { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#111; color:#fff; font-family:sans-serif; flex-direction:column; gap:12px; }
    #progress-bar { width:200px; height:8px; background:#333; border-radius:4px; overflow:hidden; }
    #progress-fill { height:100%; background:#f97316; width:0; transition:width 0.2s; }
  </style>
</head>
<body>
  <div id="loading">
    <div>Loading…</div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
  </div>
  <canvas id="unity-canvas" tabindex="-1"></canvas>
  <script src="Build/loader.js"></script>
  <script>
    createUnityInstance(document.getElementById("unity-canvas"), {
      dataUrl:      "Build/game.data",
      frameworkUrl: "Build/framework.js",
      codeUrl:      "Build/game.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "self-hosted",
      productName: "No Pain No Gain",
      productVersion: "1.0"
    }, function(p) {
      document.getElementById("progress-fill").style.width = (p * 100) + "%";
    }).then(function() {
      document.getElementById("loading").style.display = "none";
    });
  </script>
</body>
</html>
