<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Breaking the Bank</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000}</style>
  <script src="/js/ruffle/ruffle.js"></script>
</head>
<body>
  <div id="ruffle" style="width:100%;height:100%"></div>
  <script>
    window.RufflePlayer = window.RufflePlayer || {};
    window.addEventListener("load", function() {
      const ruffle = window.RufflePlayer.newest();
      const player = ruffle.createPlayer();
      player.style.width = "100%";
      player.style.height = "100%";
      document.getElementById("ruffle").appendChild(player);
      player.load("breakingthebank.swf");
    });
  </script>
</body>
</html>
